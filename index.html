<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=schedule" />
    

    
</head>

<body>

  <div class="container">
    <div class="card">

      <!-- orejas -->
      <div class="decor top-left"></div>
      <div class="decor top-right"></div>

      <!-- confetti -->
      <div class="confetti"></div>

      <!-- INICIO -->
      <div id="inicio" class="fade-in">
        <br>
        <p class="small">UN DIA MUY ESPECIAL</p>
        <p class="coming">esta por llegar</p>

        <div class="img-box">
          <img src="img/mickey.png">
        </div>
        <h2 style="font-family: 'WickedMouse', sans-serif;">El cumple de joaco</h2>
        <!-- <h2 style="font-family: 'WickedMouse', sans-serif;">Joaco cumple d<span style="font-family: 'mickeymouse', sans-serif; font-size: 20px;">d</span>s</h2> -->

        <button id="btnAbrir" class="btn">Abrir Invitacion</button>
        <!-- 
        <div class="orejas">
          <div class="decor_oreja oreja"></div>
          <div class="decor oreja"></div>
          <div class="decor oreja"></div>
          <div class="decor oreja"></div>
        </div> -->

        <div class="decor button-left"></div>
        <div class="decor button-right"></div>
      </div>

      <!-- CONTENIDO -->
      <div id="contenido" class="hidden">
        <br>
        <br>
        <p class="small">Te invito a celebrar mi vida...</p>
        <p class="coming">y a comer más pastel del que deberíamos</p>

        <div class="img-box">
          <img src="img/mickey2.gif">
        </div>
        <h1 class="nombre">Cumple 2 de Joaco</h1>

        <p class="mensaje">
          <span style="font-weight: bold; font-style: italic;">¡Se viene FIESTÓN!</span>
          <br>
          cumpleaños, risas y alguna que otra locura. ¿Vienes?
        </p>

        <div class="linea"></div>

        <div class="info">📅 25 de Abril, 2026</div>
        <div class="info">
          <span class="material-symbols-outlined">
            schedule
          </span> 3:30 PM
        </div>

        <div class="info">
          <span class="material-symbols-outlined" id="icons">
            location_on
          </span>
          <a href="https://maps.app.goo.gl/aLitSLATgT4RAyoo7" target="_blank">
            ConjuntoAltos de Tajamar
          </a>
        </div>

        <button class="btn" id="btnWhatsApp">
          <span class="material-icons-outlined">
favorite
</span>Confirmar Asistencia
        </button>
        <div class="decor button-left"></div>
        <div class="decor button-right"></div>
      </div>

    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
