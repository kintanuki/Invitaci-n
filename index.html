<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <div class="card">

      <!-- orejas -->
      <div class="decor top-left"></div>
      <div class="decor top-right"></div>

      <!-- confetti -->
      <div class="confetti"></div>

      <!-- INICIO -->
      <div id="inicio" class="fade-in">
        <p class="small">UN DIA MUY ESPECIAL</p>
        <p class="coming">esta por llegar</p>

        <div class="img-box">
          <img src="img/Mickey.webp">
        </div>

        <h2>Estas invitado a mi fiesta</h2>

        <button id="btnAbrir" class="btn">Abrir Invitacion</button>
      </div>

      <!-- CONTENIDO -->
      <div id="contenido" class="hidden">
        <p class="small">UN DIA MUY ESPECIAL</p>
        <p class="coming">esta por llegar</p>

        <div class="img-box">
          <img src="../img/mickey.webp">
        </div>
        <h1 class="nombre">Joaquin<br>Two</h1>

        <p class="mensaje">
          Señor, llena con tu luz la vida de Joaquin,<br>
          y que tu protección lo acompañe siempre.
        </p>

        <div class="linea"></div>

        <div class="info">📅 28 de Abril, 2026</div>
        <div class="info">⏰ 4:00 PM</div>

        <div class="info">
          📍
          <a href="https://www.google.com/maps?q=Parque+San+Remo+2" target="_blank">
            Parque San Remo 2
          </a>
        </div>

        <button class="btn" id="btnWhatsApp">
          Confirmar Asistencia
        </button>

      </div>

    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
